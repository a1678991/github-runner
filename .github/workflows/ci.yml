name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0 # commitlint needs the PR commit range
          persist-credentials: false
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
      - run: npm ci
      - run: golangci-lint run
      - run: golangci-lint fmt --diff
      - run: git ls-files '*.sh' | xargs -r shfmt -d
      - run: git ls-files '*.sh' | xargs -r shellcheck
      - run: actionlint
      - run: zizmor --offline .github/workflows/
      - run: npx secretlint "**/*"
      - if: github.event_name == 'pull_request'
        run: npx commitlint --from "$BASE_SHA" --to HEAD
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
      - run: sudo apt-get update && sudo apt-get install -y qemu-utils genisoimage
      - run: go test -race ./...

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
      - run: go build ./...

  docker-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Resolve latest runner release
        id: runner
        run: |
          rel=$(curl -fsSL -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/actions/runner/releases/latest)
          version=$(echo "$rel" | jq -r .tag_name | cut -c2-)
          arch="x64"
          asset="actions-runner-linux-${arch}-${version}.tar.gz"
          url=$(echo "$rel" | jq -r --arg a "$asset" '.assets[] | select(.name == $a) | .browser_download_url')
          sha=$(echo "$rel" | grep -oP "(?<=${arch} SHA256: )[0-9a-f]{64}" || true)
          {
            echo "version=${version}"
            echo "url=${url}"
            echo "sha=${sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Build runner images (dind + slim)
        run: |
          for target in dind slim; do
            docker build \
              --pull --target "$target" \
              --build-arg RUNNER_VERSION="${{ steps.runner.outputs.version }}" \
              --build-arg RUNNER_TARBALL_URL="${{ steps.runner.outputs.url }}" \
              --build-arg RUNNER_TARBALL_SHA256="${{ steps.runner.outputs.sha }}" \
              --tag "ghq-runner-${target}:ci-test" \
              scripts/docker/
          done

      - name: Verify image contents
        run: |
          for tag in ghq-runner-dind:ci-test ghq-runner-slim:ci-test; do
            docker run --rm "$tag" which unzip
            docker run --rm "$tag" test -f /etc/apt/apt.conf.d/90assume-yes
            docker run --rm "$tag" test -x /opt/actions-runner/bin/run
          done
