name: Packaging

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  arch-package:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      # git must exist before checkout; base-devel does not include it
      - run: pacman -Syu --noconfirm git go qemu-base cdrtools namcap
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - name: Prepare non-root builder copy
        run: |
          useradd -m builder
          git config --system --add safe.directory '*'
          # makepkg clones from this copy; give it a real branch (PR
          # checkouts are detached HEADs, which git clone cannot follow).
          git switch -C ci-build
          cp -r "$PWD" /home/builder/src
          chown -R builder:builder /home/builder/src
      - name: Point PKGBUILD at this checkout
        run: |
          sed -i 's|git+https://github.com/a1678991/github-qemu-runner.git|git+file:///home/builder/src|' \
            /home/builder/src/packaging/arch/PKGBUILD
      - name: Build package
        run: su builder -c 'cd /home/builder/src/packaging/arch && makepkg --noconfirm'
      - name: namcap (fail on errors only)
        run: |
          cd /home/builder/src/packaging/arch
          namcap ./*.pkg.tar.zst | tee /tmp/namcap.out || true
          if grep ' E: ' /tmp/namcap.out; then
            echo '::error::namcap reported errors'
            exit 1
          fi
      - name: Install and smoke test
        run: |
          cd /home/builder/src/packaging/arch
          pacman -U --noconfirm ./*.pkg.tar.zst
          rc=0; github-qemu-runner nonsense || rc=$?
          test "$rc" -eq 2
          pacman -Ql github-qemu-runner-git | grep sysusers.d
          pacman -Ql github-qemu-runner-git | grep tmpfiles.d
          execstart=$(grep '^ExecStart=' /usr/lib/systemd/system/github-qemu-runner.service | cut -d= -f2- | awk '{print $1}')
          test -x "$execstart"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: arch-package
          path: /home/builder/src/packaging/arch/*.pkg.tar.zst

  arch-release-package:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      # git must exist before checkout; base-devel does not include it
      - run: pacman -Syu --noconfirm git go qemu-base cdrtools namcap
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - name: Prepare non-root builder copy
        run: |
          useradd -m builder
          git config --system --add safe.directory '*'
          ver=$(sed -n 's/^pkgver=\([0-9.]*\).*/\1/p' packaging/arch/release/PKGBUILD)
          test -n "$ver" || { echo '::error::failed to extract pkgver from PKGBUILD'; exit 1; }
          cp -r packaging/arch/release /home/builder/build
          # The release PKGBUILD sources the tag tarball, which does not
          # exist for unreleased code; build from this checkout instead.
          git archive --format=tar.gz --prefix="github-qemu-runner-$ver/" \
            -o "/home/builder/build/github-qemu-runner-$ver.tar.gz" HEAD
          # shellcheck disable=SC2016 # $url/$pkgver must stay literal for sed
          sed -i 's|::$url/archive/v$pkgver.tar.gz||' /home/builder/build/PKGBUILD
          grep -qF "source=(\"\$pkgname-\$pkgver.tar.gz\")" /home/builder/build/PKGBUILD \
            || { echo '::error::source swap sed did not match'; exit 1; }
          chown -R builder:builder /home/builder/build
      - name: Build package
        run: su builder -c 'cd /home/builder/build && makepkg --noconfirm'
      - name: namcap (fail on errors only)
        run: |
          cd /home/builder/build
          namcap ./*.pkg.tar.zst | tee /tmp/namcap.out || true
          if grep ' E: ' /tmp/namcap.out; then
            echo '::error::namcap reported errors'
            exit 1
          fi
      - name: Install and smoke test
        run: |
          cd /home/builder/build
          pacman -U --noconfirm ./*.pkg.tar.zst
          rc=0; github-qemu-runner nonsense || rc=$?
          test "$rc" -eq 2
          pacman -Ql github-qemu-runner | grep sysusers.d
          pacman -Ql github-qemu-runner | grep tmpfiles.d
          execstart=$(grep '^ExecStart=' /usr/lib/systemd/system/github-qemu-runner.service | cut -d= -f2- | awk '{print $1}')
          test -x "$execstart"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: arch-release-package
          path: /home/builder/build/*.pkg.tar.zst

  deb-package:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
      - name: Build package
        env:
          ARCH: ${{ matrix.arch }}
        run: packaging/deb/build.sh "$ARCH"
      - name: lintian (fail on errors only)
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq lintian
          lintian --tag-display-limit 0 packaging/deb/dist/*.deb | tee /tmp/lintian.out || true
          if grep '^E: ' /tmp/lintian.out; then
            echo '::error::lintian reported errors'
            exit 1
          fi
      - name: Install and smoke test (native)
        if: matrix.arch == 'amd64'
        run: |
          sudo dpkg -i packaging/deb/dist/*.deb
          rc=0; github-qemu-runner nonsense || rc=$?
          test "$rc" -eq 2
          getent passwd gh-runner
          getent group kvm | grep gh-runner
          test -d /var/lib/github-qemu-runner
          execstart=$(grep '^ExecStart=' /usr/lib/systemd/system/github-qemu-runner.service | cut -d= -f2- | awk '{print $1}')
          test -x "$execstart"
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        if: matrix.arch == 'arm64'
        with:
          platforms: arm64
      # Real arm64 dpkg + binary under qemu-user; the systemd-dependent
      # postinst branches are skipped by their guards in the container.
      - name: Install and smoke test (arm64 container)
        if: matrix.arch == 'arm64'
        run: |
          docker run --rm --platform linux/arm64 \
            -v "$PWD/packaging/deb/dist:/pkgs:ro" ubuntu:24.04 bash -ec '
            dpkg -i /pkgs/*.deb
            rc=0; github-qemu-runner nonsense || rc=$?
            test "$rc" -eq 2'
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deb-package-${{ matrix.arch }}
          path: packaging/deb/dist/*.deb

  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - run: nix flake check --print-build-logs
      - name: Format check
        # nixfmt >= 1.3 treats a bare invocation as stdin, so pass the file
        # list explicitly.
        run: |
          git ls-files '*.nix' | xargs -r nix fmt
          git diff --exit-code
      - name: Smoke test
        run: |
          rc=0; nix run .#default -- nonsense || rc=$?
          test "$rc" -eq 2
