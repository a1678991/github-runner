name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create tags and releases
      pull-requests: write # open/update release PRs
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        id: release

  arch-package:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # gh release upload
    container: archlinux:base-devel
    steps:
      # git must exist before checkout; base-devel does not include it.
      # github-cli provides gh.
      - run: pacman -Syu --noconfirm git go qemu-base cdrtools namcap github-cli
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          persist-credentials: false
      - name: Prepare non-root builder copy
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          useradd -m builder
          git config --system --add safe.directory '*'
          ver=$(sed -n 's/^pkgver=\([0-9.]*\).*/\1/p' packaging/arch/release/PKGBUILD)
          test -n "$ver" || { echo '::error::failed to extract pkgver from PKGBUILD'; exit 1; }
          test "v$ver" = "$TAG" \
            || { echo "::error::PKGBUILD pkgver v$ver does not match released tag $TAG"; exit 1; }
          cp -r packaging/arch/release /home/builder/build
          # The repo is private, so the PKGBUILD's public archive URL 404s
          # for the anonymous curl that makepkg/updpkgsums use. Provide the
          # source tarball from this authenticated checkout of the tag
          # instead; makepkg uses a pre-existing source file as-is
          # (sha256sums stays SKIP).
          git archive --format=tar.gz --prefix="github-qemu-runner-$ver/" \
            -o "/home/builder/build/github-qemu-runner-$ver.tar.gz" HEAD
          chown -R builder:builder /home/builder/build
      - name: Build package
        run: runuser -u builder -- bash -c 'cd /home/builder/build && makepkg --noconfirm'
      - name: namcap (fail on errors only)
        run: |
          cd /home/builder/build
          namcap ./*.pkg.tar.zst | tee /tmp/namcap.out || true
          if grep ' E: ' /tmp/namcap.out; then
            echo '::error::namcap reported errors'
            exit 1
          fi
      - name: Install and smoke test
        run: |
          cd /home/builder/build
          pacman -U --noconfirm ./*.pkg.tar.zst
          rc=0; github-qemu-runner nonsense || rc=$?
          test "$rc" -eq 2
          pacman -Ql github-qemu-runner | grep sysusers.d
          pacman -Ql github-qemu-runner | grep tmpfiles.d
          execstart=$(grep '^ExecStart=' /usr/lib/systemd/system/github-qemu-runner.service | cut -d= -f2- | awk '{print $1}')
          test -x "$execstart"
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          cd /home/builder/build
          for f in *.pkg.tar.zst; do sha256sum "$f" > "$f.sha256"; done
          gh release upload "$TAG" ./*.pkg.tar.zst ./*.pkg.tar.zst.sha256 --clobber

  deb:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # gh release upload
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          persist-credentials: false
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
      - name: Build package
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
          ARCH: ${{ matrix.arch }}
        run: DEB_VERSION="${TAG#v}" packaging/deb/build.sh "$ARCH"
      - name: lintian (fail on errors only)
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq lintian
          lintian --tag-display-limit 0 packaging/deb/dist/*.deb | tee /tmp/lintian.out || true
          if grep '^E: ' /tmp/lintian.out; then
            echo '::error::lintian reported errors'
            exit 1
          fi
      - name: Install and smoke test (native)
        if: matrix.arch == 'amd64'
        run: |
          sudo dpkg -i packaging/deb/dist/*.deb
          rc=0; github-qemu-runner nonsense || rc=$?
          test "$rc" -eq 2
          getent passwd gh-runner
          execstart=$(grep '^ExecStart=' /usr/lib/systemd/system/github-qemu-runner.service | cut -d= -f2- | awk '{print $1}')
          test -x "$execstart"
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        if: matrix.arch == 'arm64'
        with:
          platforms: arm64
      - name: Install and smoke test (arm64 container)
        if: matrix.arch == 'arm64'
        run: |
          docker run --rm --platform linux/arm64 \
            -v "$PWD/packaging/deb/dist:/pkgs:ro" ubuntu:24.04 bash -ec '
            dpkg -i /pkgs/*.deb
            rc=0; github-qemu-runner nonsense || rc=$?
            test "$rc" -eq 2'
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          ARCH: ${{ matrix.arch }}
        run: |
          cd packaging/deb/dist
          # Guard: the asset name must carry the released version.
          test -f "github-qemu-runner_${TAG#v}_$ARCH.deb"
          for f in *.deb; do sha256sum "$f" > "$f.sha256"; done
          gh release upload "$TAG" ./*.deb ./*.deb.sha256 --clobber

  tarball:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # gh release upload
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          persist-credentials: false
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
      - name: Build
        run: CGO_ENABLED=0 go build -trimpath -o github-qemu-runner ./cmd/github-qemu-runner
      - name: Smoke test
        run: |
          rc=0; ./github-qemu-runner nonsense || rc=$?
          test "$rc" -eq 2
      - name: Pack
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          dir="github-qemu-runner_${TAG#v}_linux_amd64"
          mkdir "$dir"
          cp github-qemu-runner LICENSE README.md \
            packaging/config.example.yaml packaging/github-qemu-runner.service "$dir/"
          tar -czf "$dir.tar.gz" "$dir"
          sha256sum "$dir.tar.gz" > "$dir.tar.gz.sha256"
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "$TAG" ./*.tar.gz ./*.tar.gz.sha256 --clobber
