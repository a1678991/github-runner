pre-commit:
  parallel: true
  jobs:
    - name: go-fmt
      glob: "*.go"
      run: mise exec -- golangci-lint fmt {staged_files}
      stage_fixed: true
    - name: go-lint
      glob: "*.go"
      run: mise exec -- golangci-lint run
    - name: shfmt
      glob: "*.sh"
      run: mise exec -- shfmt -w {staged_files}
      stage_fixed: true
    - name: shellcheck
      glob: "*.sh"
      run: mise exec -- shellcheck {staged_files}
    - name: actionlint
      glob: ".github/workflows/*.{yml,yaml}"
      run: mise exec -- actionlint
    - name: secretlint
      run: mise exec -- npx secretlint --maskSecrets {staged_files}
    - name: nixfmt
      glob: "*.nix"
      run: nix fmt {staged_files}
      stage_fixed: true

commit-msg:
  jobs:
    - name: commitlint
      run: mise exec -- npx commitlint --edit {1}
