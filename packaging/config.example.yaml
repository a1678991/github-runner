# github-qemu-runner configuration. Copy to
# /etc/github-qemu-runner/config.yaml and edit.

github:
  # Your GitHub App (needs: org "Self-hosted runners: Read & write" for
  # org pools, repo "Administration: Read & write" for repo pools).
  app_id: 123456
  installation_id: 7890123
  private_key_path: /etc/github-qemu-runner/app-key.pem
  # api_base_url: https://api.github.com

# state_dir: /var/lib/github-qemu-runner

# Override per-concern subdirectories. Defaults to state_dir/images and
# state_dir/run when unset; both must be absolute paths if set. Useful
# for putting qcow2 files on a separate fast disk.
#paths:
#  images: /mnt/fast/github-qemu-runner/images
#  run:    /mnt/fast/github-qemu-runner/run

# Image auto-refresh. When the controller starts and a required base/runner
# image is missing, bake it automatically instead of failing. Set to false
# to restore fail-fast (run `refresh-image` manually first).
#images:
#  auto_refresh: true

# Docker backend (for hosts without /dev/kvm). Jobs run in gVisor-sandboxed
# containers; see "Docker backend" in the README for host prerequisites.
#docker:
#  runtime: runsc        # runsc (default) | runc (NO sandbox — read README first)

pools:
  - name: fmt
    scope: org # org | repo (repo also needs `repo: owner/name`)
    org: my-org
    count: 2
    cpus: 2
    memory_mb: 2048
    disk_gb: 20
    labels: [self-hosted, linux, x64, fmt]
    # Org-scope pools can join a named runner group to control which repos
    # may use the runners. The group must already exist (org Settings ->
    # Actions -> Runner groups). Repo-scope pools must keep "Default".
    # runner_group: Default
    # liveness_timeout: 5m
    # drain_timeout: 30m
  - name: build
    scope: org
    org: my-org
    count: 1
    cpus: 8
    memory_mb: 16384
    disk_gb: 60
    labels: [self-hosted, linux, x64, build]
  #- name: oci-arm
  #  backend: docker     # qemu (default) | docker
  #  isolation: gvisor   # gvisor (default; Docker-in-Docker via runsc) | seccomp
  #                      # (native runc + Docker's default seccomp profile;
  #                      # faster, but NO docker inside jobs — see README)
  #  # seccomp_profile: /etc/ghq/strict.json  # optional custom profile
  #  scope: org
  #  org: my-org
  #  count: 2
  #  cpus: 2
  #  memory_mb: 8192
  #  disk_gb: 30         # advisory only on docker pools (not enforced)
  #  labels: [self-hosted, linux, arm64, oci]
